# Alembic generic single-database configuration file.
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Format for migration file names: YYYY-MM-DD_HHMM_<slug>.py
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone for generated timestamps
timezone = UTC

# Allow .pyc files in the migrations directory
truncate_slug_length = 40

# Prepend sys.path with the backend directory so app modules are importable
# This path is set relative to this file's location (alembic.ini sits at backend/)
prepend_sys_path = .

# ---------------------------------------------------------------------------
# SQLAlchemy URL — overridden dynamically in env.py from app settings.
# Leave this as a placeholder; do NOT put real credentials here.
# ---------------------------------------------------------------------------
sqlalchemy.url = postgresql+psycopg2://placeholder/placeholder

[post_write_hooks]
# Hooks to run after generating a new migration file (e.g., auto-formatting)
# Uncomment to enable black formatting on generated migration files:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
